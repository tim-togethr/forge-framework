<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge</title>
<style>
  :root {
    --bg-primary: #f5f5f7;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e5e5e7;
    --border: #d1d1d6;
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --success: #34c759;
    --warning: #ff9f0a;
    --error: #ff3b30;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1d1d1f;
      --bg-secondary: #2d2d2f;
      --bg-tertiary: #3d3d3f;
      --border: #424245;
      --text-primary: #f5f5f7;
      --text-secondary: #86868b;
      --text-tertiary: #636366;
      --accent: #0a84ff;
      --accent-hover: #409cff;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* Typography */
  h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
  h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
  .subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 24px; }
  .section { margin-bottom: 32px; }
  .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); margin-bottom: 8px; }

  /* Options (A/B/C choices) */
  .options { display: flex; flex-direction: column; gap: 16px; }
  .option {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .option h3 { margin-bottom: 4px; }
  .option p { font-size: 14px; color: var(--text-secondary); }

  /* Cards (visual designs) */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Recommended highlight */
  .recommended {
    border-color: var(--accent);
    background: var(--bg-secondary);
    background: color-mix(in srgb, var(--accent) 15%, var(--bg-secondary));
  }

  /* Mockup container */
  .mockup {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .mockup-header {
    background: var(--bg-tertiary);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .mockup-body { padding: 20px; }

  /* Split view (side-by-side) */
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .split, .pros-cons { grid-template-columns: 1fr; } }

  /* Pros and Cons */
  .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
  .pros, .cons { font-size: 14px; list-style: disc inside; }
  .pros li { color: var(--success); }
  .cons li { color: var(--error); }
  .pros li span, .cons li span { color: var(--text-primary); }

  /* Placeholder block */
  .placeholder {
    background: var(--bg-tertiary);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* Mock wireframe elements */
  .mock-nav {
    background: var(--bg-tertiary);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
  }
  .mock-sidebar {
    background: var(--bg-tertiary);
    padding: 16px;
    border-right: 1px solid var(--border);
    min-width: 180px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .mock-content { padding: 20px; flex: 1; }
  .mock-button {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
  }
  .mock-input {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text-primary);
    width: 100%;
  }
</style>
</head>
<body>
  <header>
    <h1>Forge</h1>
  </header>
  <main id="claude-content">
    <!-- CONTENT -->
  </main>
  <footer>Return to terminal to continue</footer>
</body>
</html>
